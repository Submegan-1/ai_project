    am4core.ready(function() {
    am4core.useTheme(am4themes_animated);
    var chart = am4core.create("chartdiv_AgePyramid", am4charts.XYChart);

      // 解決中文亂碼：指定字體
    chart.fontFamily = "Microsoft JhengHei";
    // 範例資料
    chart.data = [
        {"category": "18-30", "stay": 235, "left": -91}, 
        {"category": "30-40", "stay": 533, "left": -89},
        {"category": "40-50", "stay": 315, "left": -34},
        {"category": "50-60+", "stay": 150, "left": -23}]

    // Y 軸 (年齡層)
    var categoryAxis = chart.yAxes.push(new am4charts.CategoryAxis());
    categoryAxis.dataFields.category = "category";
    categoryAxis.renderer.grid.template.location = 0;
    categoryAxis.renderer.inversed = true; // 讓年齡由小到大排列
    categoryAxis.cursorTooltipEnabled = false;

    // X 軸 (人數)
    var valueAxis = chart.xAxes.push(new am4charts.ValueAxis());
    valueAxis.extraMin = 0.1;
    valueAxis.extraMax = 0.1;
    
  valueAxis.renderer.labels.template.adapter.add("text", function(text) {
    // 加上 text && 判斷，確保有文字才執行取代
    return (text && typeof text === "string") ? text.replace("-", "") : text;
});

    // 建立系列函數
    function createSeries(field, name, color, pointer) {
        var series = chart.series.push(new am4charts.ColumnSeries());
        series.dataFields.valueX = field;
        series.dataFields.categoryY = "category";
        series.name = name;
        series.columns.template.fill = am4core.color(color);
        series.columns.template.strokeOpacity = 0;
        series.stacked = true;
        series.tooltipText = ""; // 禁用小框
        
        // 柱子上的數字標籤也轉為正數
        var labelBullet = series.bullets.push(new am4charts.LabelBullet());
        labelBullet.label.text = "{valueX}";
        labelBullet.label.adapter.add("text", function(text) {
            return text.replace("-", "");
        });
        labelBullet.label.fill = am4core.color("#fff");
        labelBullet.locationX = 0.5;
    }

    createSeries("left", "離職人數", Pink); // 左側紅色
    createSeries("stay", "在職人數", Green); // 右側藍色

    // --- 大黑框合併顯示 ---
    var infoSeries = chart.series.push(new am4charts.ColumnSeries());
    infoSeries.dataFields.valueX = "stay";
    infoSeries.dataFields.categoryY = "category";
    infoSeries.tooltipHTML = " ";
    infoSeries.columns.template.fillOpacity = 0;
    infoSeries.columns.template.strokeOpacity = 0;

    infoSeries.tooltip.getFillFromObject = false;
    infoSeries.tooltip.background.fill = am4core.color("#000");
    infoSeries.tooltip.background.fillOpacity = 0.9;

    infoSeries.adapter.add("tooltipHTML", function(text, target) {
        var d = target.tooltipDataItem ? target.tooltipDataItem.dataContext : null;
        if (d) {
            var leftCount = Math.abs(d.left); // 轉正
            var total = d.stay + leftCount;
            var rate = ((leftCount / total) * 100).toFixed(1);
            
            return `
                <div style='text-align:center; border-bottom:1px solid #fff; margin-bottom:8px; padding:5px;'>
                    <b>年齡分層: ${d.category}</b>
                </div>
                <table style='color:#fff; min-width:150px;'>
                    <tr><td style='color:#55EFC4'>在職人數:</td><td style='text-align:right; font-weight:bold;'>${d.stay}</td></tr>
                    <tr><td style='color:#FF7675'>離職人數:</td><td style='text-align:right; font-weight:bold;'>${leftCount}</td></tr>
                    <tr style='border-top:1px solid #666;'>
                        <td style='padding-top:8px;'>離職率:</td>
                        <td style='padding-top:8px; text-align:right; color:#FAD02E; font-weight:bold;'>${rate}%</td>
                    </tr>
                </table>`;
        }
        return text;
    });

    chart.cursor = new am4charts.XYCursor();
    chart.cursor.behavior = "none";
    chart.cursor.lineX.disabled = true;

    chart.legend = new am4charts.Legend();
});

<script>
am5.ready(function() {
  // Create root element
  var root = am5.Root.new("chartContribution");
  var myTheme = am5.Theme.new(root);

  myTheme.rule("Grid", ["base"]).setAll({
    strokeOpacity: 0.1
  });

  root.setThemes([
    am5themes_Animated.new(root),
    myTheme
  ]);

  // Create chart
  var chart = root.container.children.push(
    am5xy.XYChart.new(root, {
      panX: false,
      panY: false,
      wheelX: "none",
      wheelY: "none",
      paddingLeft: 0
    })
  );

  // Create axes
  var yRenderer = am5xy.AxisRendererY.new(root, {
    minGridDistance: 20, // 縮減間距以顯示更多標籤
    minorGridEnabled: true
  });
  yRenderer.grid.template.set("location", 1);

  var yAxis = chart.yAxes.push(
    am5xy.CategoryAxis.new(root, {
      maxDeviation: 0,
      categoryField: "Feature", // 對應資料中的特徵名稱
      renderer: yRenderer
    })
  );

  var xAxis = chart.xAxes.push(
    am5xy.ValueAxis.new(root, {
      maxDeviation: 0,
      min: 0,
      renderer: am5xy.AxisRendererX.new(root, {
        visible: true,
        strokeOpacity: 0.1,
        minGridDistance: 80
      })
    })
  );

  // Create series
  var series = chart.series.push(
    am5xy.ColumnSeries.new(root, {
      name: "XGBoost Gain",
      xAxis: xAxis,
      yAxis: yAxis,
      valueXField: "value",
      categoryYField: "Feature",
      sequencedInterpolation: true
    })
  );
var riskColor = am5.color(Orange);    // 紅色 = 增加離職
var safeColor = am5.color(Green);    // 藍色 = 降低離職
  var columnTemplate = series.columns.template;

    draggable: true,

    cornerRadiusTR: 10,
    strokeOpacity: 0,

  });

  "錢少事多離家遠+單身",   // Burnout/Life stress 相關

  "住得遠又加班","教育背景","很久沒升遷"
]);


// adapter 讀取每筆資料的 fill 欄位
columnTemplate.adapters.add("fill", (fill, target) => {
  if (target.dataItem) {
    var dataContext = target.dataItem.dataContext;
    return dataContext && dataContext.fill ? dataContext.fill : fill;
  }
  return fill;
});

columnTemplate.adapters.add("stroke", (stroke, target) => {
  if (target.dataItem) {
    var dataContext = target.dataItem.dataContext;
    return dataContext && dataContext.fill ? dataContext.fill : stroke;
  }
  return stroke;
});


  // 排序邏輯
  function getSeriesItem(category) {
    for (var i = 0; i < series.dataItems.length; i++) {
      var dataItem = series.dataItems[i];
      if (dataItem.get("categoryY") == category) return dataItem;
    }
  }

  function sortCategoryAxis() {
    series.dataItems.sort(function (x, y) {
      return y.get("graphics").y() - x.get("graphics").y();
    });
    var easing = am5.ease.out(am5.ease.cubic);

    am5.array.each(yAxis.dataItems, function (dataItem) {
      var seriesDataItem = getSeriesItem(dataItem.get("category"));
      if (seriesDataItem) {
        var index = series.dataItems.indexOf(seriesDataItem);
        var column = seriesDataItem.get("graphics");
        var fy = yRenderer.positionToCoordinate(yAxis.indexToPosition(index)) - column.height() / 2;

        if (index != dataItem.get("index")) {
          dataItem.set("index", index);
          column.set("dy", -(fy - column.y()));
          column.animate({ key: "dy", to: 0, duration: 600, easing: easing });
        } else {
          column.animate({ key: "y", to: fy, duration: 600, easing: easing });
        }
      }
    });
    yAxis.dataItems.sort(function (x, y) { return x.get("index") - y.get("index"); });
  }

  columnTemplate.events.on("dragstop", () => {

    { Feature: "月薪", "value": 2.629163 ,fill: safeColor}
